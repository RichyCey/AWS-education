version: 0.2

phases:
  install:
    commands:
      - wget -q https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip
      - unzip -o terraform_1.9.8_linux_amd64.zip -d /usr/local/bin/
      - terraform --version
      - "pip install --platform manylinux2014_x86_64 --only-binary=:all: --implementation cp --python-version 3.13 psycopg2-binary -t lambda/layer/python --quiet"
      - cd lambda/layer && zip -r ../psycopg2_layer.zip python -x '*.pyc' && cd ../..
  pre_build:
    commands:
      - terraform fmt -check -recursive
  build:
    commands:
      - terraform init -input=false
      - terraform validate
      - |
        terraform plan -input=false -no-color \
          -target=module.networking \
          -target=module.security \
          -target=module.iam \
          -target=module.database \
          -target=module.ecr \
          -target=module.ecs \
          -target=module.monitoring \
          -target=module.lambda
